on:
  pull_request:
    paths:
      - src/*.ts
      - fixtures/**/*.swift
      - .github/workflows/checks.yml
      - dist/*

jobs:
  verify-dist:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: npm i
      - run: npm run prepare
      - run: git diff --exit-code

  defaults:
    runs-on: macos-latest
    needs: [verify-dist]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        with:
          working-directory: fixtures/debug

  xcodebuild-has-exited:
    runs-on: macos-latest
    needs: [verify-dist]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        with:
          working-directory: fixtures/debug
      - run: |
          if pgrep -a xcodebuild; then
            echo >&2 "error: xcodebuild is still running"
            exit 1
          fi

  executable-runs:
    runs-on: macos-latest
    needs: [verify-dist]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        with:
          action: build
          working-directory: fixtures/executable
      - run: |
          OUT=$(~/Library/Developer/Xcode/DerivedData/executable-*/Build/Products/Debug/my-fixture)
          if [[ "${OUT}" != 'Hello, world!' ]]; then
            echo >&2 "error: output of my-fixture was unexpected: ${OUT}"
            exit 1
          fi

  invalid-action-fails:
    runs-on: macos-latest
    needs: [verify-dist]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        id: xcodebuild
        with:
          action: invalid
          working-directory: fixtures/debug
        continue-on-error: true
      - if: steps.xcodebuild.outcome == 'success'
        run: |
          echo >&2 "error: expected action to fail, but it succeeded"
          exit 1

  invalid-platform-fails:
    runs-on: macos-latest
    needs: [verify-dist]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        id: xcodebuild
        with:
          platform: invalid
          working-directory: fixtures/debug
        continue-on-error: true
      - if: steps.xcodebuild.outcome == 'success'
        run: |
          echo >&2 "error: expected action to fail, but it succeeded"
          exit 1

  invalid-swift-fails:
    runs-on: macos-latest
    needs: [verify-dist]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        id: xcodebuild
        with:
          swift: invalid
          working-directory: fixtures/debug
        continue-on-error: true
      - if: steps.xcodebuild.outcome == 'success'
        run: |
          echo >&2 "error: expected action to fail, but it succeeded"
          exit 1

  invalid-xcode-fails:
    runs-on: macos-latest
    needs: [verify-dist]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        id: xcodebuild
        with:
          xcode: invalid
          working-directory: fixtures/debug
        continue-on-error: true
      - if: steps.xcodebuild.outcome == 'success'
        run: |
          echo >&2 "error: expected action to fail, but it succeeded"
          exit 1

  missing-api-key-id-fails:
    runs-on: macos-latest
    needs: [verify-dist]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        id: xcodebuild
        with:
          authentication-key-base64: 'Cg=='
          authentication-key-issuer-id: '14sb3dw0-r3t1-83u1-g381-4k9sg1t3w8r2'
          working-directory: fixtures/debug
        continue-on-error: true
      - if: steps.xcodebuild.outcome == 'success'
        run: |
          echo >&2 "error: expected action to fail, but it succeeded"
          exit 1

  missing-api-key-issuer-id-fails:
    runs-on: macos-latest
    needs: [verify-dist]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        id: xcodebuild
        with:
          authentication-key-base64: 'Cg=='
          authentication-key-id: 'JW271KX2u3'
          working-directory: fixtures/debug
        continue-on-error: true
      - if: steps.xcodebuild.outcome == 'success'
        run: |
          echo >&2 "error: expected action to fail, but it succeeded"
          exit 1

  null-none-action:
    runs-on: macos-latest
    needs: [verify-dist]
    strategy:
      matrix:
        action:
          - null # treated as '' by GHA’s parser
          - ~ # treated as '' by GHA’s parser
          - ''
          - none
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        with:
          working-directory: fixtures/debug
          action: ${{ matrix.action }}

  configurations:
    runs-on: macos-latest
    needs: [verify-dist]
    strategy:
      matrix:
        configuration:
          - debug
          - release
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        with:
          configuration: ${{ matrix.configuration }}
          working-directory: fixtures/${{ matrix.configuration }}
          # warnings-as-errors: true
          # ^^ works via generation, generation no longer works
          action: test
          upload-logs: always # so we can test this feature

  verbosity:
    runs-on: macos-latest
    needs: [verify-dist]
    strategy:
      matrix:
        verbosity:
          - xcpretty
          - xcbeautify
          - quiet
          - verbose
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        with:
          verbosity: ${{ matrix.verbosity }}
          working-directory: fixtures/debug

  swift:
    name: swift ${{ matrix.x.swift }}
    runs-on: ${{ matrix.x.os }}
    needs: [verify-dist]
    continue-on-error: true
    strategy:
      matrix:
        x:
          - swift: ~5.10
            os: macos-14
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        with:
          swift: ${{ matrix.x.swift }}
          working-directory: fixtures/swift/${{ matrix.x.swift }}
          action: build
      - uses: mxcl/get-swift-version@1c3ecc6d7d32a300008a2f187c8d194de0aa5f8c # v3.0.0
        with:
          requires: ${{ matrix.x.swift }}

  xcode:
    name: ${{ matrix.platform }} (${{ matrix.action }} ${{ matrix.xcode }} ${{ matrix.codecov && 'cc' || ''}}${{ matrix.job-name-sufix }})
    runs-on: macos-latest
    needs: [verify-dist]
    continue-on-error: true
    strategy:
      matrix:
        platform:
          - iOS
          - tvOS
          - macOS
          - watchOS
        xcode:
          - ^16
        codecov:
          - false
        action:
          - test
        warnings-as-errors:
          - false
        include:
          - job-name-sufix: ' platform-version ^17'
            platform: iOS
            platform-version: ^17
          - platform: mac-catalyst
            codecov: false
          - platform: visionOS
            codecov: false
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        with:
          platform: ${{ matrix.platform }}
          platform-version: ${{ matrix.platform-version }}
          xcode: ${{ matrix.xcode }}
          working-directory: fixtures/${{ matrix.platform }}
          code-coverage: ${{ matrix.codecov }}
          action: ${{ matrix.action }}
          warnings-as-errors: ${{ matrix.warnings-as-errors || 'false' }}
      - run: |
          xcode-select --print-path

  verify-codecov:
    name: ${{ matrix.platform }} (${{ matrix.action }}${{ matrix.codecov && ', cc' || ''}}
    runs-on: macos-latest
    needs: [verify-dist]
    strategy:
      matrix:
        platform:
          - macOS
        codecov:
          - true
          - false
        action:
          - build
          - test
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        with:
          platform: ${{ matrix.platform }}
          working-directory: fixtures/${{ matrix.platform }}
          code-coverage: ${{ matrix.codecov }}
          action: ${{ matrix.action }}

  verify-sanitizers:
    name: ${{ matrix.platform }} ${{ matrix.sanitizer }}
    runs-on: macos-latest
    needs: [verify-dist]
    strategy:
      matrix:
        platform:
          - macOS
        sanitizer:
          - thread
          - address
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        with:
          platform: ${{ matrix.platform }}
          working-directory: fixtures/${{ matrix.platform }}
          sanitizer: ${{ matrix.sanitizer }}
          action: test

  verify-dot-swift-version:
    name: .swift-version
    runs-on: macos-14
    needs: [verify-dist]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: mxcl/get-swift-version@1c3ecc6d7d32a300008a2f187c8d194de0aa5f8c # v3.0.0
        with:
          requires: '>5.8'
      - uses: ./
        with:
          working-directory: fixtures/dot-swift-version
      - uses: mxcl/get-swift-version@1c3ecc6d7d32a300008a2f187c8d194de0aa5f8c # v3.0.0
        with:
          requires: ~5.9
